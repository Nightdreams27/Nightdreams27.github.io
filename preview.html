<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nightdreamsyo | Personal Site</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: "Microsoft YaHei", sans-serif;
  color:white;
  background: #0a0f1f;
  overflow-x:hidden;
}

/* 背景动态光 */
.bg{
  position:fixed;
  width:200%;
  height:200%;
  background: radial-gradient(circle at 20% 20%, #38bdf8 0%, transparent 40%),
              radial-gradient(circle at 80% 30%, #a78bfa 0%, transparent 40%),
              radial-gradient(circle at 50% 80%, #22c55e 0%, transparent 40%);
  animation: move 12s infinite alternate;
  opacity:0.2;
  z-index:-1;
}

@keyframes move{
  from{transform:translate(-10%, -10%)}
  to{transform:translate(-5%, -5%)}
}

/* 顶部 */
header{
  text-align:center;
  padding:100px 20px 60px;
}

header h1{
  font-size:3.5rem;
  letter-spacing:2px;
  color:#38bdf8;
  text-shadow:0 0 20px #38bdf8;
}

header p{
  margin-top:15px;
  color:#cbd5e1;
  font-size:1.1rem;
}

/* 导航 */
nav{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-bottom:50px;
}

nav a{
  color:white;
  text-decoration:none;
  padding:8px 14px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;
  transition:0.3s;
}

nav a:hover{
  background:#38bdf8;
  color:black;
}

/* 内容区 */
.container{
  width:90%;
  max-width:1000px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:25px;
  margin-bottom:25px;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
  transform:translateY(-5px);
  border-color:#38bdf8;
}

h2{
  color:#38bdf8;
  margin-bottom:10px;
}

/* 项目 */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.item{
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:15px;
  transition:0.3s;
}

.item:hover{
  background:rgba(56,189,248,0.2);
}

/* 底部 */
footer{
  text-align:center;
  padding:30px;
  color:#94a3b8;
  margin-top:40px;
}
</style>

</head>

<body>

<div class="bg"></div>

<header>
  <h1>Nightdreamsyo</h1>
  <p>长安大学 · 智能车辆工程 · B站UP主</p>
</header>

<nav>
  <a href="#about">关于我</a>
  <a href="#project">项目</a>
  <a href="#study">学习</a>
  <a href="#contact">联系</a>
</nav>

<div class="container">

  <section id="about" class="card">
    <h2>关于我</h2>
    <p>我是一名智能车辆工程专业学生，热爱汽车技术、编程开发与内容创作。</p>
  </section>

  <section id="project" class="card">
    <h2>项目经历</h2>
    <div class="grid">
      <div class="item">🚗 社会实践：红岩精神调研</div>
      <div class="item">🤖 Python机器学习项目</div>
      <div class="item">💻 C++课程设计</div>
      <div class="item">🎥 B站视频创作</div>
    </div>
  </section>

  <section id="study" class="card">
    <h2>学习方向</h2>
    <div class="grid">
      <div class="item">C++编程</div>
      <div class="item">Python数据分析</div>
      <div class="item">智能车辆技术</div>
      <div class="item">法语学习</div>
    </div>
  </section>

  <section id="contact" class="card">
    <h2>联系我</h2>
    <p>B站：Nightdreamsyo</p>
    <p>Email：your@email.com</p>
  </section>

</div>

<footer>
  © 2026 Nightdreamsyo | Powered by GitHub Pages
</footer>

</body>
</html>
